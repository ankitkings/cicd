# ============================================================================
# CI/CD Pipeline for FastAPI Application
# ============================================================================
# This workflow demonstrates a complete CI/CD pipeline that:
# 1. Runs automated tests when code is pushed
# 2. Only deploys if tests pass (quality gate)
# 3. Automatically deploys to a remote server
# ============================================================================

name: Deploy FastAPI App

# ============================================================================
# TRIGGERS - When this pipeline runs
# ============================================================================
on:
  push:
    branches:
      - main   # 👈 triggers only when you push to the 'main' branch
               # This ensures we only deploy stable code from the main branch

# ============================================================================
# JOBS - The main sections of our pipeline
# ============================================================================
jobs:
  # ========================================================================
  # JOB 1: TESTING PHASE
  # ========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest  # GitHub provides free Ubuntu runners
    
    steps:
      # ----------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest   # ✅ Ensure pytest is installed
      
      # ----------------------------------------------------------------
      - name: Run automated tests
        run: pytest test_main.py -v
        # -v flag gives verbose test output

  # ========================================================================
  # JOB 2: DEPLOYMENT PHASE
  # ========================================================================
  deploy:
    name: Deploy to Ubuntu VM
    runs-on: ubuntu-latest
    needs: test  # 👈 Only runs if the "test" job succeeds

    steps:
      # ----------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      - name: Setup SSH connection
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      # ----------------------------------------------------------------
      - name: Deploy FastAPI to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            echo "🚀 Starting deployment on EC2..."

            # CONFIG
            BASE_PATH=${{ secrets.PROJECT_PATH }}      # e.g., /home/ec2-user
            PROJECT_DIR="$BASE_PATH/cicd"
            REPO_URL="https://github.com/ankitkings/cicd.git"

            # Install Git if missing
            if ! command -v git &> /dev/null; then
              echo "📦 Installing Git..."
              sudo yum install -y git
            fi

            # CODE SYNC
            if [ -d "$PROJECT_DIR/.git" ]; then
              echo "📂 Project exists. Pulling latest changes..."
              cd "$PROJECT_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "🆕 Cloning fresh repository..."
              cd "$BASE_PATH"
              git clone $REPO_URL cicd
              cd cicd
            fi

            # PYTHON SETUP
            echo "🐍 Setting up Python environment..."
            if ! command -v python3 &> /dev/null; then
              echo "Installing Python3..."
              sudo yum install -y python3
            fi
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # ENV VARIABLES
            if [ -f ".env" ]; then
              echo "🔐 Loading environment variables..."
              export $(cat .env | xargs)
            else
              echo "⚠️ No .env file found."
            fi

            # STOP OLD PROCESS
            echo "🛑 Stopping existing FastAPI app..."
            pkill -f "python3 main.py" || true

            # START APP
            echo "🚀 Starting FastAPI app with nohup..."
            nohup venv/bin/python3 main.py > app.log 2>&1 &

            echo "✅ Deployment complete! Check app.log for logs."
          EOF
